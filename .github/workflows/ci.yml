name: Skills CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: Ruff, Pyright, Black, and Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout skills
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Black
        run: uv run black --check .

      - name: Test
        run: uv run pytest
